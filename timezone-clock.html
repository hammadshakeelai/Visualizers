<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Timezone Digital Clock</title>
    <link rel="stylesheet" href="timezone-clock.css">
</head>
<body>
    <div class="container">
        <h1>⏰ Global Time Zones</h1>
        
        <div class="controls">
            <button id="add-timezone-btn" class="btn btn-add">+ Add Time Zone</button>
            <button id="reset-btn" class="btn btn-reset">Reset</button>
        </div>

        <div class="timezone-modal" id="timezone-modal">
            <div class="modal-content">
                <h2>Add Time Zone</h2>
                <input type="text" id="timezone-search" placeholder="Search timezone (e.g., New York, London)...">
                <div class="timezone-list" id="timezone-list"></div>
                <button class="btn btn-cancel" id="modal-close">Close</button>
            </div>
        </div>

        <div class="clocks-container" id="clocks-container">
            <!-- Clocks will be added here dynamically -->
        </div>
    </div>

    <script src="timezone-clock.js"></script>
</body>
</html>
