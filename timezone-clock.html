<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timezone Clock</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin-top: 50px; }
        .clock { font-size: 24px; margin: 20px; }
    </style>
</head>
<body>
    <h1>Current Time in Multiple Time Zones</h1>
    <div class="clock" id="utc-clock"></div>
    <div class="clock" id="est-clock"></div>
    <div class="clock" id="pst-clock"></div>

    <script>
        function updateClocks() {
            const now = new Date();
            const utc = now.toUTCString();
            const est = new Date(now.toLocaleString('en-US', { timeZone: 'America/New_York' })).toLocaleString();
            const pst = new Date(now.toLocaleString('en-US', { timeZone: 'America/Los_Angeles' })).toLocaleString();
            
            document.getElementById('utc-clock').innerText = 'UTC: ' + utc;
            document.getElementById('est-clock').innerText = 'EST: ' + est;
            document.getElementById('pst-clock').innerText = 'PST: ' + pst;
        }
        updateClocks();
        setInterval(updateClocks, 1000);
    </script>
</body>
</html>
